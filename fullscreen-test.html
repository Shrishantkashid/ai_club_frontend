<!DOCTYPE html>
<html>
<head>
    <title>Fullscreen Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a192f;
            color: #e2e8f0;
            padding: 2rem;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(30, 58, 95, 0.6);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(30, 58, 95, 0.3);
        }
        button {
            background: #64ffda;
            color: #0a192f;
            border: none;
            padding: 1rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 1rem;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(100, 255, 218, 0.6);
        }
        .status {
            margin: 1rem 0;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(10, 25, 47, 0.5);
        }
        .warning {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fullscreen Test Page</h1>
        <p>Click the button below to test fullscreen functionality</p>
        
        <div class="status" id="status">
            Ready to test fullscreen
        </div>
        
        <button id="fullscreenBtn">Enter Fullscreen</button>
        <button id="exitBtn" style="display: none;">Exit Fullscreen</button>
        
        <div class="status warning">
            <h3>Test Instructions:</h3>
            <p>1. Click "Enter Fullscreen" button</p>
            <p>2. Press ESC key to exit fullscreen</p>
            <p>3. Watch for automatic re-entry attempts</p>
            <p>4. Check console for detailed logs</p>
        </div>
    </div>

    <script>
        let warningCount = 0;
        const maxWarnings = 3;
        const statusDiv = document.getElementById('status');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const exitBtn = document.getElementById('exitBtn');

        // Function to request fullscreen
        const requestFullscreen = async () => {
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                    updateStatus('Entered fullscreen mode', 'success');
                    fullscreenBtn.style.display = 'none';
                    exitBtn.style.display = 'inline-block';
                    return true;
                }
                return false;
            } catch (err) {
                console.warn('Fullscreen request failed:', err);
                updateStatus('Failed to enter fullscreen', 'error');
                return false;
            }
        };

        // Function to exit fullscreen
        const exitFullscreen = async () => {
            try {
                if (document.exitFullscreen) {
                    await document.exitFullscreen();
                    updateStatus('Exited fullscreen mode', 'info');
                    fullscreenBtn.style.display = 'inline-block';
                    exitBtn.style.display = 'none';
                }
            } catch (err) {
                console.warn('Exit fullscreen failed:', err);
            }
        };

        // Update status display
        const updateStatus = (message, type = 'info') => {
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type === 'success') {
                statusDiv.style.background = 'rgba(74, 222, 128, 0.2)';
                statusDiv.style.border = '1px solid rgba(74, 222, 128, 0.3)';
            } else if (type === 'error') {
                statusDiv.style.background = 'rgba(239, 68, 68, 0.2)';
                statusDiv.style.border = '1px solid rgba(239, 68, 68, 0.3)';
            } else {
                statusDiv.style.background = 'rgba(10, 25, 47, 0.5)';
                statusDiv.style.border = '1px solid rgba(100, 255, 218, 0.3)';
            }
        };

        // Fullscreen change handler
        const handleFullscreenChange = () => {
            const isFullscreen = !!document.fullscreenElement;
            console.log('Fullscreen change detected:', isFullscreen ? 'Entered' : 'Exited');
            
            if (!isFullscreen) {
                warningCount++;
                updateStatus(`Fullscreen exited! Warning ${warningCount}/${maxWarnings}`, 'warning');
                
                if (warningCount < maxWarnings) {
                    alert(`Warning: Fullscreen exit detected. You have ${maxWarnings - warningCount} warnings remaining.`);
                    
                    // Attempt automatic re-entry with multiple attempts
                    const attemptReentry = async (attempt = 1) => {
                        try {
                            console.log(`Fullscreen re-entry attempt ${attempt}`);
                            const success = await requestFullscreen();
                            if (success) {
                                console.log("Successfully re-entered fullscreen");
                                updateStatus("Successfully re-entered fullscreen", 'success');
                            } else {
                                console.warn(`Failed to re-enter fullscreen on attempt ${attempt}`);
                                if (attempt < 3) {
                                    setTimeout(() => attemptReentry(attempt + 1), attempt * 1000);
                                } else {
                                    updateStatus("Failed to re-enter fullscreen after multiple attempts", 'error');
                                    alert("You must be in fullscreen mode. Please press F11 or use browser controls to re-enter fullscreen.");
                                }
                            }
                        } catch (err) {
                            console.warn(`Failed to re-enter fullscreen on attempt ${attempt}:`, err);
                            if (attempt < 3) {
                                setTimeout(() => attemptReentry(attempt + 1), attempt * 1000);
                            } else {
                                updateStatus("Failed to re-enter fullscreen after multiple attempts", 'error');
                                alert("You must be in fullscreen mode. Please press F11 or use browser controls to re-enter fullscreen.");
                            }
                        }
                    };
                    
                    // Start first attempt after a short delay
                    setTimeout(() => attemptReentry(1), 300);
                } else {
                    updateStatus("Maximum warnings reached - auto-submission would occur", 'error');
                    alert("Maximum warnings reached. In a real exam, this would result in auto-submission.");
                }
            } else {
                updateStatus('Currently in fullscreen mode', 'success');
            }
        };

        // Event listeners
        fullscreenBtn.addEventListener('click', requestFullscreen);
        exitBtn.addEventListener('click', exitFullscreen);
        document.addEventListener('fullscreenchange', handleFullscreenChange);

        // Initial status
        updateStatus('Ready to test fullscreen functionality');
        console.log('Fullscreen test page loaded. Open console for detailed logs.');
    </script>
</body>
</html>
